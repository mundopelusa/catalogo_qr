<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mundo Pelusa MX</title>
  <style>
    body {
      font-family: Atma, sans-serif;
      text-align: center;
      margin: 40px;
      background-color: #df8338;
      background-image: url("portada.png");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      background-attachment: fixed;
    }

    .contenedor {
      max-width: 900px;
      margin: auto;
      background: rgba(255, 255, 255, 0.92);
      background-image: url("Fondo.png");
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.12);
    }

    .boton {
      display: inline-block;
      margin: 20px 0;
      padding: 14px 22px;
      text-decoration: none;
      border-radius: 8px;
      font-size: 18px;
      background: #24292f;
      color: white;
    }

    iframe {
      width: 100%;
      height: 80vh;
      border: 1px solid #ddd;
      border-radius: 8px;
    }
  </style>
</head>
<body>
  <div class="contenedor">
    <h1>Consulta Nuestro Catalogo</h1>
    <p>Haz clic en el botón para abrir o descargar el archivo.</p>

    <a class="boton" href="catalogo_mundo-pelusa.pdf" target="_blank">Abrir PDF</a>

    <iframe src="catalogo_mundo-pelusa.pdf"></iframe>
  </div>
</body>
</html>
