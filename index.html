<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Consulta nuestro catalogo</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      margin: 40px;
      background: #f7f7f7;
    }
    .contenedor {
      max-width: 900px;
      margin: auto;
      background: white;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.12);
    }
    .boton {
      display: inline-block;
      margin: 20px 0;
      padding: 14px 22px;
      text-decoration: none;
      border-radius: 8px;
      font-size: 18px;
      background: #24292f;
      color: white;
    }
    iframe {
      width: 100%;
      height: 80vh;
      border: 1px solid #ddd;
      border-radius: 8px;
    }
  </style>
</head>
<body>
  <div class="contenedor">
    <h1>Documento PDF</h1>
    <p>Haz clic en el botón para abrir o descargar el archivo.</p>

    <a class="boton" href="catalogo_mundo-pelusa.pdf" target="_blank">Abrir PDF</a>

    <iframe src="documento.pdf"></iframe>
  </div>
</body>
</html>
